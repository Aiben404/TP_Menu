<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TP Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="overlay" id="overlay">
  <div class="menu-wrapper" id="menuWrapper">

    <!-- Header -->
    <div class="menu-header">
      <div class="header-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
      </div>
      <div class="header-text">
        <div class="header-title">TP Menu</div>
        <div class="header-sub">Click a location to teleport...</div>
      </div>
      <div class="header-badge">ESX</div>
      <button class="close-btn" id="closeBtn" title="Close (ESC)">✕</button>
    </div>

    <!-- Search (hidden on History tab) -->
    <div class="search-bar" id="searchBar">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <input type="text" id="searchInput" placeholder="Search locations…" oninput="filterLocations(this.value)">
      <span class="search-clear" id="searchClear" onclick="clearSearch()">✕</span>
    </div>

    <!-- Tabs (built dynamically) -->
    <div class="tab-bar" id="tabBar"></div>

    <!-- Location list -->
    <div class="location-list" id="locationList">
      <div class="empty-state"><div class="empty-icon">⊘</div><div>Loading…</div></div>
    </div>

    <!-- Footer -->
    <div class="menu-footer">
      <button class="btn btn-ghost" onclick="closeMenu()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 11H7.83l4.88-4.88c.39-.39.39-1.03 0-1.42-.39-.39-1.02-.39-1.41 0l-6.59 6.59c-.39.39-.39 1.02 0 1.41l6.59 6.59c.39.39 1.02.39 1.41 0 .39-.39.39-1.02 0-1.41L7.83 13H19c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>
        Close (ESC)
      </button>
    </div>

  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
